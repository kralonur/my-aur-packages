name: AUR Updates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      manual_sync:
        description: "Sync tracked PKGBUILD/.SRCINFO from main to AUR without running aur-updater"
        type: boolean
        default: false
      commit_message:
        description: "Commit message for the AUR push (manual_sync only)"
        type: string
        default: "chore: manual sync"
  push:
    branches:
      - main
      - master
    paths:
      - packages.toml
      - eim-bin/**
      - .github/workflows/update.yml

permissions:
  contents: write

concurrency:
  group: aur-update
  cancel-in-progress: false

env:
  UPDATER_URL: https://github.com/kralonur/aur-updater/releases/latest/download/aur-updater-x86_64-unknown-linux-musl
  AUR_PKGSITE: ssh://aur@aur.archlinux.org/eim-bin.git
  COMMIT_AUTHOR_NAME: "github-actions[bot]"
  COMMIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"

jobs:
  update:
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.manual_sync == true) }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install system packages
        run: pacman -Syu --noconfirm --needed base-devel git curl pacman-contrib openssh

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Prepare build user
        run: |
          id pkgbuild >/dev/null 2>&1 || useradd --create-home --shell /bin/bash pkgbuild
          chown -R pkgbuild:pkgbuild "$GITHUB_WORKSPACE"

      - name: Download updater
        run: |
          curl -fsSL "$UPDATER_URL" -o updater
          chmod +x updater
          chown pkgbuild:pkgbuild updater

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          runuser --preserve-environment -u pkgbuild -- bash <<'EOF'
          set -euo pipefail
          export HOME=/home/pkgbuild
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ./updater update --config packages.toml --changed-packages-out /tmp/changed-packages
          EOF

      - name: Check for changes
        id: changes
        run: |
          set -euo pipefail
          if [[ -s /tmp/changed-packages ]]; then
            new_version="$(awk -F'\t' '{print $2; exit}' /tmp/changed-packages)"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
            echo "::notice::New version detected: $new_version"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::All packages are up to date; nothing to commit or push."
          fi

      - name: Commit to GitHub
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name  "$COMMIT_AUTHOR_NAME"
          git config --global user.email "$COMMIT_AUTHOR_EMAIL"
          git add eim-bin/PKGBUILD eim-bin/.SRCINFO
          if ! git diff --cached --quiet; then
            git commit -m "chore: update eim-bin to ${{ steps.changes.outputs.new_version }}"
            git push origin HEAD
          fi

      - name: Push to AUR
        if: steps.changes.outputs.changed == 'true'
        id: aur-ssh
        uses: ./.github/actions/setup-aur-ssh
        with:
          private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          known-hosts: ${{ secrets.AUR_SSH_KNOWN_HOSTS }}

      - name: Mirror tracked files to AUR
        if: steps.changes.outputs.changed == 'true'
        env:
          AUR_SSH_DIR: ${{ steps.aur-ssh.outputs.ssh-dir }}
        run: |
          set -euo pipefail
          # Absolute paths so OpenSSH skips tilde expansion (which would use
          # the passwd home, not $HOME) for the identity and known_hosts.
          SSH_CMD="ssh -i $AUR_SSH_DIR/id_aur \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=$AUR_SSH_DIR/known_hosts \
            -o PasswordAuthentication=no \
            -o PreferredAuthentications=publickey"

          GIT_SSH_COMMAND="$SSH_CMD" git clone "$AUR_PKGSITE" /tmp/aur-eim-bin
          cp -v eim-bin/PKGBUILD eim-bin/.SRCINFO /tmp/aur-eim-bin/

          cd /tmp/aur-eim-bin
          git config user.name  "$COMMIT_AUTHOR_NAME"
          git config user.email "$COMMIT_AUTHOR_EMAIL"
          git config core.sshCommand "$SSH_CMD"

          git add PKGBUILD .SRCINFO
          if ! git diff --cached --quiet; then
            git commit -m "chore: update to ${{ steps.changes.outputs.new_version }}"
            git push origin HEAD
          else
            echo "::notice::AUR clone already matches; nothing to push."
          fi

          rm -f "$AUR_SSH_DIR/id_aur" "$AUR_SSH_DIR/known_hosts"
          rm -rf /tmp/aur-eim-bin

  manual-sync:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.manual_sync == true }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install system packages
        run: pacman -Syu --noconfirm --needed git openssh

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Setup AUR SSH
        id: aur-ssh
        uses: ./.github/actions/setup-aur-ssh
        with:
          private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          known-hosts: ${{ secrets.AUR_SSH_KNOWN_HOSTS }}

      - name: Sync tracked files to AUR
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          AUR_SSH_DIR: ${{ steps.aur-ssh.outputs.ssh-dir }}
        run: |
          set -euo pipefail
          # Mirror the author of the latest commit on the maintenance repo's
          # main branch onto the AUR commit, so manual fixes are attributed to
          # the actual maintainer rather than the CI bot.
          AUTHOR_NAME=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=format:%an)
          AUTHOR_EMAIL=$(git -C "$GITHUB_WORKSPACE" log -1 --pretty=format:%ae)
          echo "::notice::AUR commit author: $AUTHOR_NAME <$AUTHOR_EMAIL>"

          # Absolute paths so OpenSSH skips tilde expansion (which would use
          # the passwd home, not $HOME) for the identity and known_hosts.
          SSH_CMD="ssh -i $AUR_SSH_DIR/id_aur \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=$AUR_SSH_DIR/known_hosts \
            -o PasswordAuthentication=no \
            -o PreferredAuthentications=publickey"

          GIT_SSH_COMMAND="$SSH_CMD" git clone "$AUR_PKGSITE" /tmp/aur-eim-bin
          cp -v eim-bin/PKGBUILD eim-bin/.SRCINFO /tmp/aur-eim-bin/

          cd /tmp/aur-eim-bin
          git config user.name  "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git config core.sshCommand "$SSH_CMD"

          git add PKGBUILD .SRCINFO
          if ! git diff --cached --quiet; then
            git commit -m "$COMMIT_MESSAGE"
            git push origin HEAD
            echo "::notice::Pushed '$COMMIT_MESSAGE' to AUR."
          else
            echo "::notice::AUR clone already matches tracked files; nothing to push."
          fi

          rm -f "$AUR_SSH_DIR/id_aur" "$AUR_SSH_DIR/known_hosts"
          rm -rf /tmp/aur-eim-bin